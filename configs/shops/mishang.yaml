# 迷尚店铺配置

shop_code: "mishang"
shop_name: "迷尚"
enabled: true

# Etsy 配置
etsy:
  shop_id: "mishang_shop_id"
  orders_url: "https://www.etsy.com/your/orders/sold/open"

# 飞书多维表格配置
feishu:
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"

  order_table:
    app_token: "MStWbahj8at2ZvsnheqcJtm2nYb"
    table_id: "tblalRxohrGovqXK"
    fields:
      order_id: "Etsy订单号"
      tracking_number: "运单号"
      local_tracking: "运单末端号码"
      status: "收货状态"
      customer_name: "顾客姓名"
      label_url: "面单链接"

# 邮件监控配置
email:
  enabled: true
  provider: "yahoo"
  address: "${YAHOO_EMAIL_MISHANG}"
  password: "${YAHOO_APP_PASSWORD_MISHANG}"
  imap_server: "imap.mail.yahoo.com"
  imap_port: 993
  check_interval: 60

# 物流配置
logistics:
  default_provider: "takesend"

  yunexpress:
    enabled: false

  takesend:
    enabled: true
    client_id: "${TAKESEND_CLIENT_ID}"
    auth_token: "${TAKESEND_AUTH_TOKEN}"
    base_url: "http://k5.takesend.com:8180/WebCOrder"
    channels:
      US: "US_CN_A"
      GB: "UK_EXCN"
      DE: "DE_P_CN"
      FR: "FR_EXCN"
      CA: "CA_E_CN"
      AU: "AU_eParcel"

# SKU 规则
sku_rules:
  prefix_mapping:
    "Mishang": "takesend"

  supplier_mapping:
    "Mishang": "迷尚"

# 产品数据库
products:
  source: "json"
  file_path: "./data/products_mishang.json"

# 发件人信息
sender:
  first_name: "Xiaokang"
  last_name: "Tian"
  company: "StrawCrafters"
  country_code: "CN"
  province: "Shandong"
  city: "Zibo City"
  address: "Building 11, Unit 2, Room 1403"
  postal_code: "255005"
  phone: "15387963207"
  email: ""

# 任务调度
schedule:
  process_orders:
    enabled: true
    cron: "*/5 * * * *"

  return_tracking:
    enabled: true
    cron: "0 */2 * * *"

  calculate_profit:
    enabled: false

# 功能开关
features:
  auto_order_processing: true
  auto_tracking_return: true
  auto_review_invite: false
  profit_calculation: false
  label_generation: true

# ============================================
# 🎯 迷尚店铺特定业务规则
# ============================================
business_rules:
  # 下单时的特殊处理
  order_submission:
    add_custom_note: true  # ✅ 迷尚店铺需要添加备注
    custom_note: "易碎品，请小心处理。Fragile, handle with care."
    require_signature: true  # ✅ 需要签名
    insurance_required: true  # ✅ 需要保险
    insurance_value: 50.0  # 保险金额（美元）

  # 地址验证规则
  address_validation:
    strict_mode: true  # ✅ 严格模式
    allow_po_box: false  # ❌ 不允许PO Box
    require_phone: true  # ✅ 必须有电话

  # 价格计算规则
  pricing:
    apply_discount: true  # ✅ 应用折扣
    discount_rate: 0.05  # 5%折扣
    min_order_value: 15.0  # 最小订单金额15美元

  # 库存检查
  inventory:
    check_before_order: true  # ✅ 下单前检查库存
    low_stock_threshold: 10  # 低库存阈值

  # 通知设置
  notifications:
    send_wechat: true  # ✅ 发送微信通知
    send_email: false  # ❌ 不发送邮件通知

# 日志配置
logging:
  level: "INFO"
  file: "logs/mishang.log"
