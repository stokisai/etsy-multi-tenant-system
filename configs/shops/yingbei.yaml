# 迎贝店铺配置

shop_code: "yingbei"
shop_name: "迎贝"
enabled: true

# Etsy 配置
etsy:
  shop_id: "yingbei"
  orders_url: "https://www.etsy.com/your/orders/sold/open"

# 飞书多维表格配置
feishu:
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"

  # 天问表（tianwen SKU）
  tianwen_table:
    app_token: "F6vVbQeriaswHQsjf7McEzPOnmg"
    table_id: "tblXcWUWgoKBuxzL"
    name: "天问"

  # 析安订单表（xian SKU）
  xian_table:
    app_token: "EJzcbjdZIaeXA7sqx0mcLbvCnmb"
    table_id: "tbloeDuHW5OZ45x9"
    name: "析安订单表"

# 邮件监控配置
email:
  enabled: true
  provider: "gmail_api"  # 使用 Gmail API
  address: "${GMAIL_ADDRESS}"
  client_id: "${GMAIL_CLIENT_ID}"
  client_secret: "${GMAIL_CLIENT_SECRET}"
  check_interval: 60

# 物流配置
logistics:
  default_provider: "yunexpress"  # 默认使用云途物流

  # 🎯 云途物流（标配，必须启用）
  yunexpress:
    enabled: true
    app_id: "${YUNEXPRESS_APP_ID}"
    app_secret: "${YUNEXPRESS_APP_SECRET}"
    source_key: "${YUNEXPRESS_SOURCE_KEY}"
    channels:
      US: "USTHPHR"
      US_ISLAND: "THPDYPY"
      OTHER: "THPHR"

  # 🎯 泰嘉物流（可选）
  takesend:
    enabled: false

# SKU 规则（迎贝店铺暂无特殊 SKU 规则）
sku_rules:
  prefix_mapping: {}
  supplier_mapping: {}

# 产品数据库
products:
  source: "json"
  file_path: "./data/products_yingbei.json"

# 发件人信息
sender:
  first_name: "Xiaokang"
  last_name: "Tian"
  company: "StrawCrafters"
  country_code: "CN"
  province: "Shandong"
  city: "Zibo City"
  address: "Building 11, Unit 2, Room 1403"
  postal_code: "255005"
  phone: "15387963207"
  email: ""

# 任务调度
schedule:
  process_orders:
    enabled: true
    cron: "*/5 * * * *"

  return_tracking:
    enabled: true
    cron: "0 */2 * * *"

  calculate_profit:
    enabled: false

# 功能开关
features:
  auto_order_processing: true
  auto_tracking_return: true
  auto_review_invite: false
  profit_calculation: false
  label_generation: true

# ============================================
# 店铺特定业务规则
# ============================================
business_rules:
  # 下单时的特殊处理
  order_submission:
    add_custom_note: false
    custom_note: ""
    require_signature: false
    insurance_required: false

  # 地址验证规则
  address_validation:
    strict_mode: false
    allow_po_box: true
    require_phone: false

  # 价格计算规则
  pricing:
    apply_discount: false
    discount_rate: 0.0
    min_order_value: 0.0

# 日志配置
logging:
  level: "INFO"
  file: "logs/yingbei.log"
