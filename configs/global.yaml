# 全局配置文件
# 所有店铺共享的配置

# 浏览器配置
browser:
  chrome_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  debug_port: 9222
  user_data_dir: "~/.etsy-chrome-profile"

# Etsy 通用配置
etsy:
  timeouts:
    navigation: 30000
    element_wait: 10000
    between_orders: 3000

# 物流商映射
carrier_mapping:
  "中国邮政": "China Post"
  "云途": "Yanwen"
  "4PX": "4PX Worldwide Express"
  "菜鸟": "Cainiao"
  "ePacket": "ePacket"

# IOSS 配置
ioss:
  code: "IM3720000224"
  countries:
    - AT
    - BE
    - BG
    - CY
    - CZ
    - DE
    - DK
    - EE
    - ES
    - FI
    - FR
    - GR
    - HR
    - HU
    - IE
    - IT
    - LT
    - LU
    - LV
    - NL
    - PL
    - PT
    - RO
    - SE
    - SI
    - SK

# 美国岛屿地区
us_islands:
  - HI  # 夏威夷
  - PR  # 波多黎各
  - GU  # 关岛
  - VI  # 美属维尔京群岛
  - AS  # 美属萨摩亚
  - MP  # 北马里亚纳群岛

# 日志配置
logging:
  level: "INFO"
  rotation: "10 MB"
  retention: "7 days"
